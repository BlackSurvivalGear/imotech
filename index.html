<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImoTech | Professional Invoice Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --imo-blue: #2563eb;
            --imo-slate: #0f172a;
            --imo-border: #e2e8f0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: #f8fafc; 
            padding: 40px 20px; 
            color: var(--imo-slate); 
        }

        h1 { text-align: center; font-weight: 800; letter-spacing: -0.05em; margin-bottom: 30px; font-size: 2.5rem; }

        .app-container { 
            max-width: 1100px; 
            margin: auto; 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 30px; 
        }

        .editor-section, .preview-section {
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--imo-border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #64748b; margin-bottom: 8px; letter-spacing: 0.5px; }

        input, select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 10px; 
            border: 1px solid var(--imo-border); 
            background: #fcfdfe;
            font-size: 14px;
            transition: all 0.2s;
        }

        input:focus { outline: none; border-color: var(--imo-blue); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        /* FIXED ITEM ROW LAYOUT */
        .item-row { 
            display: grid; 
            grid-template-columns: 2fr 80px 120px 100px 40px; 
            gap: 12px; 
            align-items: center; 
            margin-bottom: 12px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 12px;
        }

        .item-row input { margin-bottom: 0; padding: 10px; font-size: 14px; }

        .btn {
            background: var(--imo-slate); color: #fff; padding: 14px 24px; border: none; border-radius: 12px;
            cursor: pointer; font-weight: 600; transition: all 0.2s;
        }

        .btn:hover { background: #1e293b; transform: translateY(-1px); }
        .btn-blue { background: var(--imo-blue); }
        .btn-blue:hover { background: #1d4ed8; }

        .remove-btn { background: #fee2e2; color: #ef4444; border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Invoice Preview Styles */
        #invoicePaper { 
            background: white; 
            padding: 50px; 
            color: #000; 
            min-height: 800px;
            border: 1px solid #eee;
        }

        .invoice-header { display: flex; justify-content: space-between; margin-bottom: 40px; }
        .invoice-table { width: 100%; border-collapse: collapse; margin: 30px 0; }
        .invoice-table th { background: #f8fafc; border-bottom: 2px solid #000; padding: 12px; text-align: left; font-size: 13px; }
        .invoice-table td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }

        .signature-line { margin-top: 60px; border-top: 1px solid #000; width: 200px; padding-top: 10px; font-size: 13px; }
        .footer-logo { text-align: center; color: #94a3b8; margin-top: 50px; font-weight: 800; letter-spacing: 2px; font-size: 12px; }

        @media (min-width: 1024px) {
            .app-container { grid-template-columns: 480px 1fr; }
        }
    </style>
</head>
<body>

<h1>Invoice Generator</h1>

<div class="app-container">
    <div class="editor-section">
        <label>Your Business Name</label>
        <input type="text" id="businessName" placeholder="ImoTech Solutions" oninput="liveUpdate()">

        <label>Upload Brand Logo</label>
        <input type="file" id="logoUpload" accept="image/*">

        <label>Client Name</label>
        <input type="text" id="clientName" placeholder="Client Name / Company" oninput="liveUpdate()">

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div>
                <label>Invoice #</label>
                <input type="text" id="invoiceNumber" oninput="liveUpdate()">
            </div>
            <div>
                <label>Currency</label>
                <select id="currency" onchange="liveUpdate()">
                    <option value="USD">USD ($)</option>
                    <option value="GBP">GBP (£)</option>
                    <option value="EUR">EUR (€)</option>
                    <option value="NGN">NGN (₦)</option>
                    <option value="ZAR">ZAR (R)</option>
                </select>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 80px 120px 100px 40px; gap: 12px; padding: 0 10px;">
            <label>Description</label>
            <label>Qty</label>
            <label>Price</label>
            <label>Total</label>
            <span></span>
        </div>

        <div id="itemsContainer">
            <div class="item-row">
                <input type="text" class="desc" placeholder="Service" oninput="liveUpdate()">
                <input type="number" class="qty" value="1" oninput="liveUpdate()">
                <input type="number" class="price" value="0" step="0.01" oninput="liveUpdate()">
                <span class="rowTotal" style="font-size: 13px; font-weight: bold; color: var(--imo-blue);">0.00</span>
                <button class="remove-btn" onclick="this.parentElement.remove(); liveUpdate()">✕</button>
            </div>
        </div>

        <button class="btn" onclick="addNewItem()" style="width: 100%; margin-top: 10px; background: #e2e8f0; color: var(--imo-slate);">+ Add Line Item</button>
        <div style="margin-top: 30px;">
            <button class="btn btn-blue" onclick="downloadPDF()" style="width: 100%;">Download Official PDF</button>
        </div>
    </div>

    <div class="preview-section">
        <div id="invoicePaper">
            <div class="invoice-header">
                <div>
                    <img id="renderLogo" style="max-height: 60px; display: none; margin-bottom: 20px;">
                    <h2 id="renderBusiness" style="margin:0; font-weight: 800; text-transform: uppercase;"></h2>
                </div>
                <div style="text-align: right;">
                    <h1 style="margin:0; color:#e2e8f0; font-size: 40px; letter-spacing: 2px;">INVOICE</h1>
                    <p style="margin:5px 0; font-size: 14px;"><strong>No:</strong> <span id="renderNumber"></span></p>
                    <p style="margin:5px 0; font-size: 14px;"><strong>Date:</strong> <span id="renderDate"></span></p>
                </div>
            </div>

            <div style="margin-bottom: 30px;">
                <label>Bill To</label>
                <h3 id="renderClient" style="margin:0; font-size: 1.2rem; font-weight: 700;"></h3>
            </div>

            <table class="invoice-table">
                <thead>
                    <tr>
                        <th>Description</th>
                        <th style="width: 60px; text-align: center;">Qty</th>
                        <th style="width: 100px; text-align: right;">Price</th>
                        <th style="width: 100px; text-align: right;">Total</th>
                    </tr>
                </thead>
                <tbody id="renderItems">
                    </tbody>
            </table>

            <div style="text-align: right; margin-top: 20px;">
                <p style="font-size: 13px; color: #64748b; margin-bottom: 5px; font-weight: 600;">Total Amount Due</p>
                <h2 id="renderTotal" style="margin:0; font-size: 2.2rem; font-weight: 800; color: var(--imo-slate);"></h2>
            </div>

            <div class="signature-line">
                Authorized Signature
            </div>

            <p style="margin-top: 60px; font-size: 11px; color: #94a3b8; border-top: 1px solid #eee; padding-top: 20px; text-align: center; text-transform: uppercase; letter-spacing: 1px;">
                Thank you for your business.
            </p>
        </div>
    </div>
</div>

<div class="footer-logo">IMOTECH SOLUTIONS</div>

<script>
let logoBase64 = '';

document.getElementById('invoiceNumber').value = 'ITS-' + Math.floor(Math.random() * 9000 + 1000);
document.getElementById('renderDate').textContent = new Date().toLocaleDateString();

document.getElementById('logoUpload').addEventListener('change', function(e){
    const reader = new FileReader();
    reader.onload = function(){
        logoBase64 = reader.result;
        const img = document.getElementById('renderLogo');
        img.src = logoBase64;
        img.style.display = 'block';
        liveUpdate();
    };
    reader.readAsDataURL(e.target.files[0]);
});

function addNewItem() {
    const container = document.getElementById('itemsContainer');
    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML = `
        <input type="text" class="desc" placeholder="Service" oninput="liveUpdate()">
        <input type="number" class="qty" value="1" oninput="liveUpdate()">
        <input type="number" class="price" value="0" step="0.01" oninput="liveUpdate()">
        <span class="rowTotal" style="font-size: 13px; font-weight: bold; color: var(--imo-blue);">0.00</span>
        <button class="remove-btn" onclick="this.parentElement.remove(); liveUpdate()">✕</button>
    `;
    container.appendChild(div);
}

function liveUpdate() {
    document.getElementById('renderBusiness').textContent = document.getElementById('businessName').value || 'YOUR COMPANY';
    document.getElementById('renderClient').textContent = document.getElementById('clientName').value || 'CLIENT NAME';
    document.getElementById('renderNumber').textContent = document.getElementById('invoiceNumber').value;
    
    const currency = document.getElementById('currency').value;
    const items = document.querySelectorAll('.item-row');
    const renderTable = document.getElementById('renderItems');
    renderTable.innerHTML = '';
    
    let grandTotal = 0;

    items.forEach(item => {
        const desc = item.querySelector('.desc').value || 'Service Item';
        const qty = parseFloat(item.querySelector('.qty').value) || 0;
        const price = parseFloat(item.querySelector('.price').value) || 0;
        const total = qty * price;
        grandTotal += total;

        item.querySelector('.rowTotal').textContent = total.toLocaleString(undefined, {minimumFractionDigits: 2});

        const tr = `<tr>
            <td style="font-weight: 500;">${desc}</td>
            <td style="text-align: center;">${qty}</td>
            <td style="text-align: right;">${price.toFixed(2)}</td>
            <td style="text-align: right; font-weight: 700;">${total.toFixed(2)}</td>
        </tr>`;
        renderTable.innerHTML += tr;
    });

    document.getElementById('renderTotal').textContent = `${currency} ${grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
}

function downloadPDF() {
    const element = document.getElementById('invoicePaper');
    const opt = {
        margin: 0,
        filename: `Invoice_${document.getElementById('invoiceNumber').value}.pdf`,
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 3, useCORS: true, letterRendering: true },
        jsPDF: { unit: 'pt', format: 'a4', orientation: 'portrait' }
    };

    html2canvas(element, opt.html2canvas).then(canvas => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'pt', 'a4');
        const imgData = canvas.toDataURL('image/png');
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
        
        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
        pdf.save(opt.filename);
    });
}

liveUpdate();
</script>
</body>
</html>
