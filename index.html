<div id="panel-tool-qr" class="service-panel fixed inset-0 z-[70] bg-white overflow-y-auto">
    <div class="max-w-xl mx-auto p-8 md:p-20 text-center relative z-10">
        <button onclick="closePanel('panel-tool-qr')" class="mb-12 text-blue-600 font-bold uppercase tracking-widest text-xs flex items-center gap-2 mx-auto">
            <span>←</span> Back to Home
        </button>
        
        <div class="inline-block bg-blue-50 text-blue-600 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest mb-4">
            Utility Tool
        </div>
        
        <h2 class="text-4xl font-extrabold mb-4 text-slate-900 tracking-tight">Smart QR Generator</h2>
        <p class="text-slate-500 mb-10 font-light">Create clean, high-performance assets for your business infrastructure.</p>
        
        <div class="bg-slate-50 p-8 rounded-[2rem] border border-slate-100 shadow-inner mb-8">
            <label class="block text-left text-xs font-bold text-slate-400 uppercase mb-2 ml-2">Endpoint URL or Data</label>
            <input type="text" id="qrInput" placeholder="https://your-system.com/access" 
                class="w-full p-4 rounded-2xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition mb-6 text-slate-900" 
                oninput="updateQRCode()">
            
            <div id="qrcode" class="bg-white p-6 rounded-3xl inline-block shadow-xl border border-white mb-6">
                </div>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="presetQR('https://')" class="bg-white border border-slate-200 py-3 rounded-xl font-semibold text-slate-600 hover:bg-slate-900 hover:text-white transition">Website</button>
                <button onclick="presetQR('https://wa.me/')" class="bg-white border border-slate-200 py-3 rounded-xl font-semibold text-slate-600 hover:bg-slate-900 hover:text-white transition">WhatsApp</button>
            </div>
        </div>
        
        <button id="downloadBtn" onclick="downloadQRCode()" 
            class="hidden w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-600/20 hover:bg-blue-700 transition transform hover:-translate-y-1">
            Download Custom Asset
        </button>
    </div>
    
    <div class="fixed inset-0 opacity-[0.03] pointer-events-none flex items-center justify-center">
        <img src="logo.png" class="w-1/2">
    </div>
</div>
