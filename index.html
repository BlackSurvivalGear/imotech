<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImoTech | Smart QR Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2563eb;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
        }
        body {
            font-family: 'Inter', sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            box-sizing: border-box;
            background-color: var(--bg-dark);
            color: #f8fafc;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { font-weight: 800; letter-spacing: -0.05em; color: white; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        
        #qrcode {
            margin: 25px 0;
            display: inline-block;
            width: 100%;
        }
        input[type="text"], input[type="file"] {
            padding: 12px;
            margin: 10px 0;
            width: 100%;
            font-size: 16px;
            border: 1px solid #334155;
            border-radius: 12px;
            box-sizing: border-box;
            background-color: #0f172a;
            color: white;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-blue);
        }
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            text-align: left;
        }
        .color-group {
            background: #0f172a;
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        label { font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        
        button {
            padding: 12px 20px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .preset-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }
        .preset-buttons button {
            background: #334155;
            color: white;
            font-size: 12px;
        }
        .preset-buttons button:hover { background: #475569; }

        canvas {
            border-radius: 12px;
            background: white;
            padding: 10px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            max-width: 100%;
            height: auto;
        }

        #downloadBtn {
            display: none;
            background-color: var(--primary-blue);
            color: white;
            width: 100%;
            margin-top: 25px;
            font-size: 16px;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }
        #downloadBtn:hover { transform: translateY(-2px); background-color: #1d4ed8; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="ImoTech" style="height: 40px; margin-bottom: 20px;" onerror="this.style.display='none'">
        <h1>Smart QR Generator</h1>
        <p>Generate secure, custom-branded QR codes instantly.</p>
        
        <input type="text" id="qrInput" placeholder="Enter URL or content" oninput="updateQRCode()">

        <div class="controls-grid">
            <div class="color-group">
                <label>Foreground</label>
                <input type="color" id="foregroundColor" value="#0f172a" onchange="updateQRCode()" style="width: 30px; height: 30px; border: none; background: none; cursor: pointer;">
            </div>
            <div class="color-group">
                <label>Background</label>
                <input type="color" id="backgroundColor" value="#ffffff" onchange="updateQRCode()" style="width: 30px; height: 30px; border: none; background: none; cursor: pointer;">
            </div>
        </div>

        <div style="text-align: left; margin-top: 20px;">
            <label>Logo Overlay (Optional)</label>
            <input type="file" id="imageInput" accept="image/*" onchange="updateQRCode()">
        </div>

        <div class="preset-buttons">
            <button onclick="presetQR('https://')">Website</button>
            <button onclick="presetQR('mailto:')">Email</button>
            <button onclick="presetQR('https://wa.me/')">WhatsApp</button>
            <button onclick="presetQR('https://linkedin.com/in/')">LinkedIn</button>
        </div>

        <div id="qrcode"></div>
        
        <button id="downloadBtn" onclick="downloadQRCode()">Download Asset</button>
    </div>

    <script>
        function updateQRCode() {
            const qrInput = document.getElementById("qrInput").value;
            const foregroundColor = document.getElementById("foregroundColor").value;
            const backgroundColor = document.getElementById("backgroundColor").value;
            const imageInput = document.getElementById("imageInput").files[0];
            const qrCodeContainer = document.getElementById("qrcode");
            const downloadBtn = document.getElementById("downloadBtn");

            qrCodeContainer.innerHTML = "";
            downloadBtn.style.display = "none";

            if (qrInput.trim() !== "") {
                QRCode.toCanvas(qrInput, { 
                    errorCorrectionLevel: 'H', 
                    width: 400,
                    margin: 4,
                    color: {
                        dark: foregroundColor,
                        light: backgroundColor
                    }
                }, function (err, canvas) {
                    if (err) return;

                    const ctx = canvas.getContext("2d");

                    // Brand tag at the bottom
                    ctx.font = "bold 14px Inter, Arial";
                    ctx.fillStyle = foregroundColor;
                    ctx.textAlign = "center";
                    ctx.fillText("IMOTECH SOLUTIONS", canvas.width / 2, canvas.height - 8);

                    qrCodeContainer.appendChild(canvas);

                    if (imageInput) {
                        const reader = new FileReader();
                        reader.onload = function (e) {
                            const img = new Image();
                            img.src = e.target.result;
                            img.onload = function () {
                                const imgSize = canvas.width / 5;
                                // White circle background for logo
                                ctx.fillStyle = backgroundColor;
                                ctx.beginPath();
                                ctx.arc(canvas.width/2, canvas.height/2, (imgSize/2) + 5, 0, Math.PI * 2);
                                ctx.fill();
                                // Draw logo
                                ctx.drawImage(img, canvas.width / 2 - imgSize / 2, canvas.height / 2 - imgSize / 2, imgSize, imgSize);
                            };
                        };
                        reader.readAsDataURL(imageInput);
                    }

                    downloadBtn.style.display = "block";
                    downloadBtn.canvas = canvas;
                });
            }
        }

        function downloadQRCode() {
            const canvas = document.getElementById("downloadBtn").canvas;
            if (canvas) {
                const link = document.createElement("a");
                link.href = canvas.toDataURL("image/png");
                link.download = "ImoTech_SmartQR.png";
                link.click();
            }
        }

        function presetQR(data) {
            document.getElementById("qrInput").value = data;
            document.getElementById("qrInput").focus();
            updateQRCode();
        }
    </script>
</body>
</html>
